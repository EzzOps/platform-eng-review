name: PR Multi-Agent Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:

  security-review:
    runs-on: ubuntu-latest
    outputs:
      results: ${{ steps.review.outputs.results }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Security Review
        id: review
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          FILES=$(git diff --name-only origin/$BASE_REF...$HEAD_SHA | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "results={\"status\":\"skipped\",\"findings\":[],\"count\":0}" >> $GITHUB_OUTPUT
            exit 0
          fi
          python3 .github/workflows/scripts/security-review.py $FILES > /tmp/security-review.json
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "results<<$EOF" >> $GITHUB_OUTPUT
          cat /tmp/security-review.json >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  cncf-review:
    runs-on: ubuntu-latest
    outputs:
      results: ${{ steps.review.outputs.results }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: CNCF Review
        id: review
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          FILES=$(git diff --name-only origin/$BASE_REF...$HEAD_SHA | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "results={\"status\":\"skipped\",\"findings\":[],\"count\":0}" >> $GITHUB_OUTPUT
            exit 0
          fi
          python3 .github/workflows/scripts/cncf-review.py $FILES > /tmp/cncf-review.json
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "results<<$EOF" >> $GITHUB_OUTPUT
          cat /tmp/cncf-review.json >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  quality-review:
    runs-on: ubuntu-latest
    outputs:
      results: ${{ steps.review.outputs.results }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Quality Review
        id: review
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          FILES=$(git diff --name-only origin/$BASE_REF...$HEAD_SHA | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "results={\"status\":\"skipped\",\"findings\":[],\"count\":0}" >> $GITHUB_OUTPUT
            exit 0
          fi
          python3 .github/workflows/scripts/quality-review.py $FILES > /tmp/quality-review.json
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "results<<$EOF" >> $GITHUB_OUTPUT
          cat /tmp/quality-review.json >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  aggregate-review:
    needs: [security-review, cncf-review, quality-review]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Write review outputs to files
        env:
          SECURITY_RESULTS: ${{ toJSON(needs.security-review.outputs.results) }}
          CNCF_RESULTS: ${{ toJSON(needs.cncf-review.outputs.results) }}
          QUALITY_RESULTS: ${{ toJSON(needs.quality-review.outputs.results) }}
        run: python3 .github/workflows/scripts/write-outputs.py
      - name: Aggregate
        id: aggregate
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          FILES=$(git diff --name-only origin/$BASE_REF...$HEAD_SHA | tr '\n' ' ' || echo "")
          python3 .github/workflows/scripts/aggregate.py /tmp/security-review.json /tmp/cncf-review.json /tmp/quality-review.json $FILES
      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$(python3 -c "import json; print(json.dumps({'body': open('/tmp/pr-review-comment.md').read()}))")
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "$BODY"
